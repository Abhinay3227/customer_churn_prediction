<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#020617,#0f172a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:rgba(30,41,59,0.7);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#0f172a;
    border:1px solid #334155;
    color:white;
}

button {
    width:100%;
    padding:10px;
    background:#3b82f6;
    border:none;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
<h2>🔐 Login</h2>

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

</div>

</body>
</html>
